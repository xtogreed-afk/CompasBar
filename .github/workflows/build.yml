name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Compile TS
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepVote-BP
          path: src/BP/
